name: Pre-Release (Jellyfin 12.0)

on:
  push:
    tags:
      - "v*-rc*"
      - "v*-pre*"
      - "v*-alpha*"
      - "v*-beta*"
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (e.g. 1.0.0-rc1)"
        required: true
      is-unstable:
        description: "Mark as pre-release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write

jobs:
  pre-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          # net10.0 covers Jellyfin 12.0 RC.
          dotnet-version: 10.0.x

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_unstable=${{ inputs.is-unstable }}" >> "$GITHUB_OUTPUT"
          else
            raw="${GITHUB_REF_NAME#v}"
            echo "version=${raw}" >> "$GITHUB_OUTPUT"
            # Detect if this is a pre-release tag
            if [[ "$raw" == *"-rc"* ]] || [[ "$raw" == *"-pre"* ]] || [[ "$raw" == *"-alpha"* ]] || [[ "$raw" == *"-beta"* ]]; then
              echo "is_unstable=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_unstable=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Package Jellyfin 12.0 Only
        run: |
          python3 build/package.py \
            --version "${{ steps.ver.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --jellyfin "12.0" \
            --skip-emby \
            --changelog "Pre-release ${{ steps.ver.outputs.version }}"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*.zip
          prerelease: ${{ steps.ver.outputs.is_unstable }}
          generate_release_notes: true
